<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Liat Moss</title>
    <script>
      try {
        const saved = localStorage.getItem('theme');
        const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        if (saved === 'dark' || (!saved && prefersDark))
          document.documentElement.setAttribute('data-theme', 'dark');
      } catch (_) {}
    </script>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="hero">
      <div class="hero__overlay"></div>
      <button id="theme-toggle" type="button" class="hero__theme-toggle" onclick="toggleTheme()" aria-label="Switch to dark mode">🌙</button>
      <div class="hero__content">
        <h1 class="hero__heading">Liat Moss</h1>
        <p class="hero__subtitle">Software engineer focused on practical AI tooling for engineering teams</p>
      </div>
    </header>
    <main>
      <section class="thumbnails">
        <div class="thumbnail-card">
          <div class="thumbnail-card__label">
            <a href="about.html" class="thumbnail-card__link">About Me</a>
          </div>
          <img src="assets/about-me-thumbnail.png" alt="Liat Moss profile picture" class="thumbnail-card__image" />
        </div>
        <div class="thumbnail-card">
          <div class="thumbnail-card__label">
            <a href="blog-posts.html" class="thumbnail-card__link">Blog Posts</a>
          </div>
          <img src="assets/blog-posts-thumbnail.png" alt="Blog posts illustration" class="thumbnail-card__image" />
        </div>
        <div class="thumbnail-card">
          <div class="thumbnail-card__label">
            <a href="experience.html" class="thumbnail-card__link">Experience</a>
          </div>
          <img src="assets/experience-thumbnail.png" alt="Experience" class="thumbnail-card__image" />
        </div>
      </section>
    </main>
    <footer class="site-footer">Page created by Liat Moss using Github Copilot CLI, Github Issues and Github Actions</footer>
    <script>
      function toggleTheme() {
        const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
        document.documentElement.setAttribute('data-theme', isDark ? 'light' : 'dark');
        try { localStorage.setItem('theme', isDark ? 'light' : 'dark'); } catch (_) {}
        const btn = document.getElementById('theme-toggle');
        btn.textContent = isDark ? '🌙' : '☀️';
        btn.setAttribute('aria-label', isDark ? 'Switch to dark mode' : 'Switch to light mode');
      }
      (function () {
        const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
        const btn = document.getElementById('theme-toggle');
        btn.textContent = isDark ? '☀️' : '🌙';
        btn.setAttribute('aria-label', isDark ? 'Switch to light mode' : 'Switch to dark mode');
      })();
    </script>
  </body>
</html>
